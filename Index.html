<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="CSS/estilo_login.css">
        <script src="https://code.jquery.com/jquery-3.3.1.js" integrity="sha256-2Kok7MbOyxpgUVvAk/HJ2jigOSYS2auK4Pfzbm7uH60=" crossorigin="anonymous"></script>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <title>Login</title>
        <script src="JS/login.js" defer></script>
    </head>
    <body>
        <div class="contenedor">
            <div class="izquierda">
                <div class="contenedor-logos">
                    <div class="logos"> <!--Bloque para logo SIstema-->
                        <img src="img/LogoUSET.png" alt="Logo Sistema">
                    </div>
                    <!-- <div class="logos">
                        <img src="img/A-Logotipos SEPE.jpg" alt="Logo nomina Educativa de tlaxcala">
                    </div> -->
                </div>
            </div>
            <div class="derecha">
                <div class="NameSistema">   <!--Bloque para Nombre del Sistema-->
                    Nombre del Sistema
                </div>
                <div class="contenedorLogin">
                    <form id="formLogin" method="post">  <!--Bloque para Usuario, Contraseña y Boton-->
                        
                        <div class="form-floating mb-2">
                            <input type="text" class="form-control" id="usuario" name="usuario" placeholder="Usuario">
                            <label for="usuario">Usuario:</label>
                        </div>
                        <div class="form-floating">
                            <input type="password" class="form-control" id="passwrd" name="passwrd" placeholder="Contraseña">
                            <label for="passwrd">Contraseña:</label>
                        </div>
                        <div class="notificacionError" role="alert" id="alertIngreso">
                            <span id="errorIngreso"></span>
                        </div>
                        <button type="submit" class ="botonIngreso">Ingresar</button>
                    </form>
                </div>
                <div class="logos">   <!--Bloque para logo USET-->
                    <p>&copy; CopyRight</p>
                    <img src="img/A-Logotipos SEPE-USET.jpg" alt="Logo USET">
                </div>
            </div>
        </div>
    </body>
</html>
